<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Teste JavaScript</title>
    <link rel='stylesheet' href='main.css'>
    <script>
        function acenderLampada() {
           document.getElementById("lampada").src = "projeto-glass-html5/_imagens/lampada-acesa.jpg";
        }
        function apagarLampada() {
           document.getElementById("lampada").src = "projeto-glass-html5/_imagens/lampada-apagada.jpg";
        }
        function quebrarLampada() {
           document.getElementById("lampada").src = "projeto-glass-html5/_imagens/lampada-quebrada.jpg";
        }
    </script>
</head>
<body>
    <h1>Acenda a lâmpada</h1>
    <img src="projeto-glass-html5/_imagens/lampada-apagada.jpg" id="lampada" onmousemove="acenderLampada()" onmouseout="apagarLampada()"
    onclick="quebrarLampada()">
</body>
</html>
